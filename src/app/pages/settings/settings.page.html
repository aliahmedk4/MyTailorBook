<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Settings</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <div class="section-header">
    <div class="section-info">
      <h2>Dress Types</h2>
      <p>Customize types and their measurement fields</p>
    </div>
    <ion-button fill="solid" size="small" class="add-btn" (click)="addDressType()">
      <ion-icon slot="start" name="add-outline"></ion-icon> Add Type
    </ion-button>
  </div>

  <div class="configs-list">
    <div class="config-card" *ngFor="let config of configs">

      <!-- Card Header -->
      <div class="config-header" (click)="toggle(config.id)">
        <div class="config-left">
          <div class="config-badge" [class.default-badge]="config.isDefault">
            {{ config.isDefault ? 'Default' : 'Custom' }}
          </div>
          <span class="config-name">{{ config.name }}</span>
          <span class="field-count">{{ config.fields.length }} fields</span>
        </div>
        <div class="config-actions" (click)="$event.stopPropagation()">
          <ion-button fill="clear" size="small" (click)="renameDressType(config)">
            <ion-icon name="pencil-outline"></ion-icon>
          </ion-button>
          <ion-button fill="clear" size="small" color="danger" (click)="deleteDressType(config)">
            <ion-icon name="trash-outline"></ion-icon>
          </ion-button>
          <ion-icon [name]="expandedId === config.id ? 'chevron-up-outline' : 'chevron-down-outline'" class="chevron"></ion-icon>
        </div>
      </div>

      <!-- Expanded Fields -->
      <div class="fields-body" *ngIf="expandedId === config.id">
        <div class="fields-list">
          <div class="field-row" *ngFor="let field of config.fields">
            <ion-icon name="resize-outline" class="field-icon"></ion-icon>
            <span class="field-label">{{ field.label }}</span>
            <div class="field-actions">
              <ion-button fill="clear" size="small" (click)="editField(config, field)">
                <ion-icon name="pencil-outline"></ion-icon>
              </ion-button>
              <ion-button fill="clear" size="small" color="danger" (click)="deleteField(config, field)">
                <ion-icon name="close-outline"></ion-icon>
              </ion-button>
            </div>
          </div>
          <div class="no-fields" *ngIf="config.fields.length === 0">
            No fields yet. Add one below.
          </div>
        </div>
        <ion-button expand="block" fill="outline" size="small" class="add-field-btn" (click)="addField(config)">
          <ion-icon slot="start" name="add-circle-outline"></ion-icon>
          Add Measurement Field
        </ion-button>
      </div>

    </div>
  </div>

</ion-content>
