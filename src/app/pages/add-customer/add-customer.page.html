<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ isEdit ? 'Edit Customer' : 'New Customer' }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="form" (ngSubmit)="save()">

    <div class="form-hero">
      <div class="form-avatar">{{ displayName ? displayName.charAt(0).toUpperCase() : '?' }}</div>
      <p class="form-avatar-name">{{ displayName || 'New Customer' }}</p>
    </div>

    <div class="section-label">Name</div>

    <div class="name-row-fields">
      <ion-item class="form-item">
        <ion-label position="stacked">First Name <span class="req">*</span></ion-label>
        <ion-input formControlName="firstName" placeholder="e.g. Ahmed" clearInput></ion-input>
      </ion-item>
      <ion-item class="form-item">
        <ion-label position="stacked">Last Name</ion-label>
        <ion-input formControlName="lastName" placeholder="e.g. Khan" clearInput></ion-input>
      </ion-item>
    </div>
    <ion-note color="danger" class="err-note" *ngIf="form.get('firstName')?.invalid && form.get('firstName')?.touched">
      First name is required
    </ion-note>

    <div class="section-label">Contact</div>

    <ion-item class="form-item">
      <ion-icon name="call-outline" slot="start" class="field-icon"></ion-icon>
      <ion-label position="stacked">Phone Number</ion-label>
      <ion-input formControlName="phone" type="tel" placeholder="e.g. 0300-1234567" clearInput></ion-input>
    </ion-item>

    <div class="section-label">Address</div>

    <ion-item class="form-item">
      <ion-icon name="location-outline" slot="start" class="field-icon"></ion-icon>
      <ion-label position="stacked">Address</ion-label>
      <ion-textarea formControlName="address" placeholder="Street, City..." rows="2" autoGrow></ion-textarea>
    </ion-item>

    <ion-button expand="block" type="submit" class="save-btn" [disabled]="form.invalid">
      <ion-icon slot="start" name="{{ isEdit ? 'checkmark-circle-outline' : 'person-add-outline' }}"></ion-icon>
      {{ isEdit ? 'Update Customer' : 'Save Customer' }}
    </ion-button>
  </form>
</ion-content>
