<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ isEdit ? 'Edit Customer' : 'New Customer' }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="form" (ngSubmit)="save()">

    <div class="form-hero">
      <div class="form-avatar">{{ form.value.name ? form.value.name.charAt(0).toUpperCase() : '?' }}</div>
    </div>

    <div class="section-label">Customer Info</div>

    <ion-item class="form-item">
      <ion-label position="stacked">Full Name <span class="req">*</span></ion-label>
      <ion-input formControlName="name" placeholder="e.g. Ahmed Khan" clearInput></ion-input>
    </ion-item>
    <ion-note color="danger" class="err-note" *ngIf="form.get('name')?.invalid && form.get('name')?.touched">
      Name is required
    </ion-note>

    <ion-item class="form-item">
      <ion-label position="stacked">Phone Number</ion-label>
      <ion-input formControlName="phone" type="tel" placeholder="e.g. 0300-1234567" clearInput></ion-input>
    </ion-item>

    <ion-button expand="block" type="submit" class="save-btn" [disabled]="form.invalid">
      <ion-icon slot="start" name="{{ isEdit ? 'checkmark-circle-outline' : 'person-add-outline' }}"></ion-icon>
      {{ isEdit ? 'Update Customer' : 'Save Customer' }}
    </ion-button>
  </form>
</ion-content>
