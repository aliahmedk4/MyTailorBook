<ion-header class="ao-header">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button [defaultHref]="'/customer-detail/' + customerId"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ isEdit ? 'Edit Measurement' : 'Add Measurement' }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ao-content">
  <form [formGroup]="form" (ngSubmit)="save()">
    <div class="form-body">

      <!-- Dress Type -->
      <div class="section-label">Dress Type</div>
      <div class="modern-card">
        <div class="mfield">
          <div class="mfield-icon"><ion-icon name="shirt-outline"></ion-icon></div>
          <div class="mfield-inner">
            <span class="mfield-lbl">Select Type</span>
            <ion-select formControlName="dressType" (ionChange)="onDressTypeChange($event)"
              interface="action-sheet" class="mfield-select">
              <ion-select-option *ngFor="let c of dressConfigs" [value]="c.name">{{ c.name }}</ion-select-option>
            </ion-select>
          </div>
        </div>
      </div>

      <!-- Measurements -->
      <div class="section-label">
        Measurements <span class="section-unit">(inches)</span>
      </div>

      <div class="entry-measure-grid" *ngIf="measurementFields.length > 0">
        <div class="measure-cell" *ngFor="let field of measurementFields">
          <input type="number" inputmode="decimal" placeholder="0"
            class="measure-native-input"
            [formControlName]="field.key"/>
          <span class="measure-label">{{ field.label }}</span>
        </div>
      </div>

      <div class="modern-card no-fields-card" *ngIf="measurementFields.length === 0">
        <p>No fields for this dress type. Add them in Settings.</p>
      </div>

      <!-- Notes -->
      <div class="section-label">Notes</div>
      <div class="modern-card">
        <div class="mfield notes-field">
          <div class="mfield-icon notes-icon"><ion-icon name="document-text-outline"></ion-icon></div>
          <div class="mfield-inner">
            <ion-textarea formControlName="notes"
              placeholder="Fabric, fit preference, special instructions..."
              rows="3" autoGrow class="mfield-textarea"></ion-textarea>
          </div>
        </div>
      </div>

      <ion-button expand="block" type="submit" class="save-btn">
        <ion-icon slot="start" name="{{ isEdit ? 'checkmark-circle-outline' : 'save-outline' }}"></ion-icon>
        {{ isEdit ? 'Update Measurement' : 'Save Measurement' }}
      </ion-button>

    </div>
  </form>
</ion-content>
